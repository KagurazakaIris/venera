app-id: com.github.wgh136.venera
runtime: org.gnome.Platform
runtime-version: '48'
sdk: org.gnome.Sdk
command: venera
appstream-compose: false

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --share=network

cleanup:
  - /include
  - /lib/pkgconfig
  - /share/man
  - /share/doc

modules:
  - name: venera
    buildsystem: simple
    build-commands:
      - install -Dm755 venera /app/bin/venera
      - mkdir -p /app/bin/data /app/bin/lib
      - cp -a data/. /app/bin/data/
      - cp -a lib/. /app/bin/lib/
    sources:
      - type: dir
        path: ../build/linux/x64/release/bundle

  - name: desktop-integration
    buildsystem: simple
    build-commands:
      - install -Dm644 com.github.wgh136.venera.desktop /app/share/applications/com.github.wgh136.venera.desktop
      - install -Dm644 com.github.wgh136.venera.metainfo.xml /app/share/metainfo/com.github.wgh136.venera.metainfo.xml
      - install -Dm644 app_icon.png /app/share/icons/hicolor/1024x1024/apps/com.github.wgh136.venera.png
    sources:
      - type: file
        path: com.github.wgh136.venera.desktop
      - type: file
        path: com.github.wgh136.venera.metainfo.xml
      - type: file
        path: ../assets/app_icon.png
