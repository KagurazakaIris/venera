name: Build Flatpak

on:
  workflow_dispatch: {}
  push:
    paths:
      - '.github/workflows/flatpak.yml'
      - 'assets/app_icon.png'
      - 'flatpak/**'
      - 'linux/**'
      - 'lib/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'rust-toolchain.toml'
  pull_request:
    paths:
      - '.github/workflows/flatpak.yml'
      - 'assets/app_icon.png'
      - 'flatpak/**'
      - 'linux/**'
      - 'lib/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'rust-toolchain.toml'
  release:
    types: [published]

jobs:
  build-flatpak:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version-file: pubspec.yaml
          architecture: x64

      - name: Install host and Flatpak dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y appstream desktop-file-utils flatpak flatpak-builder libgtk-3-dev libwebkit2gtk-4.1-dev ninja-build
          flatpak remote-add --user --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub org.gnome.Platform//48 org.gnome.Sdk//48

      - name: Validate desktop metadata
        run: |
          desktop-file-validate flatpak/com.github.wgh136.venera.desktop
          appstreamcli validate --no-net flatpak/com.github.wgh136.venera.metainfo.xml

      - name: Build Flutter Linux bundle
        run: |
          flutter pub get
          flutter build linux --release

      - name: Build Flatpak
        run: |
          mkdir -p result
          cd flatpak
          flatpak-builder --repo=../repo --force-clean ../build/flatpak-builder com.github.wgh136.venera.yml
          cd ..
          flatpak build-bundle repo result/com.github.wgh136.venera.flatpak com.github.wgh136.venera

      - uses: actions/upload-artifact@v4
        with:
          name: flatpak_build
          path: result/com.github.wgh136.venera.flatpak

      - name: Upload Flatpak to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: result/com.github.wgh136.venera.flatpak
        env:
          GITHUB_TOKEN: ${{ github.token }}
